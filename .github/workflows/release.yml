name: Auto Release (wp-org)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Read version (wp-org.php)
        id: ver
        run: |
          node -e "const fs=require('fs');const c=fs.readFileSync('./wp-org.php','utf8');const m=c.match(/Version:\s+([0-9.]+)/);if(!m){process.exit(1)};process.stdout.write(m[1])" > version.txt
          echo "version=$(cat version.txt)" >> $GITHUB_OUTPUT

      - name: Compare with latest release tag
        id: cmp
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CUR: ${{ steps.ver.outputs.version }}
        run: |
          set -e
          latest_tag="$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/releases/latest" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{console.log(JSON.parse(d).tag_name||'')}catch(e){console.log('')};});")"

          latest="${latest_tag#v}"
          current="${CUR#v}"

          echo "latest_tag=${latest_tag}" >> $GITHUB_OUTPUT
          echo "latest=${latest}" >> $GITHUB_OUTPUT
          echo "current=${current}" >> $GITHUB_OUTPUT

          if [ -z "$latest" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          top="$(printf '%s\n%s\n' "$latest" "$current" | sort -V | tail -n1)"
          if [ "$top" = "$current" ] && [ "$current" != "$latest" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Install deps
        if: steps.cmp.outputs.should_release == 'true'
        run: npm ci

      - name: Build + Zip
        if: steps.cmp.outputs.should_release == 'true'
        run: npm run build

      - name: Create GitHub Release
        if: steps.cmp.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: dist/wp-org-${{ steps.ver.outputs.version }}.zip
